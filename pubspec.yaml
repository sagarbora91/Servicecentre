name: service_centre_app
description: "Service Centre Management app for a watch repair centre."
publish_to: "none"
version: 0.1.0+1

# NOTE (M0): only the dependencies M0 actually uses are pinned here. The full
# stack from BUILD_BRIEF.md §2 (cloud_firestore, firebase_auth, freezed, etc.)
# is added in its milestone via `flutter pub add`, which resolves the latest
# compatible version (per brief §0.6). Versions below are indicative and will be
# reconciled on the first `flutter pub get`.
environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  # Kept alphabetical for the sort_pub_dependencies lint.
  # Real Firebase config arrives via `flutterfire configure` (human step).
  cloud_firestore: ^5.4.0
  firebase_app_check: ^0.3.1
  firebase_auth: ^5.3.0
  firebase_core: ^3.6.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^3.0.0
  go_router: ^14.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  build_runner: ^2.4.0
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true # enables l10n (gen-l10n) codegen
  assets:
    - assets/images/
