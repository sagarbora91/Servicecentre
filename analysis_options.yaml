include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/app/l10n/app_localizations*.dart" # generated by flutter gen-l10n
    - "lib/firebase_options.dart" # generated placeholder (flutterfire configure)
  language:
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    public_member_api_docs: false
    # The codebase consistently uses relative imports within lib/; don't also
    # demand package: self-imports (the two lints are mutually exclusive).
    always_use_package_imports: false
    # Hand-written value types (e.g. AppUser) define ==/hashCode and are
    # effectively immutable; they migrate to freezed in M2, which restores the
    # @immutable guarantee. Don't require the annotation in the meantime.
    avoid_equals_and_hash_code_on_mutable_classes: false
