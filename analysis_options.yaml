include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/app/l10n/app_localizations*.dart" # generated by flutter gen-l10n
    - "lib/firebase_options.dart" # generated placeholder (flutterfire configure)
  language:
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    # M0 keeps the very_good_analysis defaults. Project-specific overrides are
    # added intentionally as they come up — not pre-emptively relaxed.
    public_member_api_docs: false
