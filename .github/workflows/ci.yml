name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - run: flutter gen-l10n
      # build_runner (freezed / riverpod_generator / json_serializable) is added
      # in M2 when codegen dependencies land; enable the step then:
      # - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test --coverage
      # Coverage gate (>= 80% on lib/features/**/{data,domain}) is wired in M2,
      # once those layers exist and produce coverage.

  functions:
    runs-on: ubuntu-latest
    # Skips until Cloud Functions exist (M8).
    if: ${{ hashFiles('functions/package.json') != '' }}
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm test
