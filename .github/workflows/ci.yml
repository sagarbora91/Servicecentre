name: CI

on: [push, pull_request]

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    # `shell: bash` runs with `-eo pipefail`, so `cmd | tee log.txt` fails the
    # step when `cmd` fails. Without it the default shell has no pipefail and
    # tee's exit code (always 0) masks analyze/test/coverage failures.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Codegen (build_runner)
        run: dart run build_runner build 2>&1 | tee build_runner.txt
      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings 2>&1 | tee analyze.txt
      - name: Test
        run: flutter test --coverage 2>&1 | tee test.txt
      - name: Coverage gate (data+domain >= 80%)
        run: node tool/check_coverage.js 2>&1 | tee coverage_report.txt

      # Publishes analyze/test/coverage output to a publicly-readable check-run
      # (auth-gated logs can't be downloaded anonymously). Runs always so the
      # coverage number is visible on success too.
      - name: Publish command output
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = (f) => {
              try { return fs.readFileSync(f, 'utf8').slice(-6000); }
              catch (_) { return '(no output captured)'; }
            };
            const summary =
              '### build_runner\n```\n' + tail('build_runner.txt') + '\n```\n' +
              '### flutter analyze\n```\n' + tail('analyze.txt') + '\n```\n' +
              '### flutter test\n```\n' + tail('test.txt') + '\n```\n' +
              '### coverage (data+domain)\n```\n' + tail('coverage_report.txt') + '\n```';
            try {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ci-output',
                head_sha: context.sha,
                status: 'completed',
                conclusion: 'neutral',
                output: {
                  title: 'CI command output',
                  summary: summary.slice(0, 65000),
                },
              });
            } catch (e) {
              core.warning('Failed to publish ci-output check: ' + e.message);
            }

  # Firestore security-rules tests (M2 acceptance: "rules deny unauthenticated").
  # Runs @firebase/rules-unit-testing against the Firestore emulator with a demo
  # project — no live Firebase project / flutterfire configure needed.
  rules:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install firebase-tools and test deps
        run: |
          npm i -g firebase-tools
          npm install --prefix firestore-tests --legacy-peer-deps
      - name: Firestore rules tests (emulator)
        run: |
          firebase emulators:exec --only firestore --project demo-sc \
            "node --test firestore-tests/rules.test.mjs" 2>&1 | tee rules.txt
      - name: Publish rules output
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '(no output captured)';
            try { body = fs.readFileSync('rules.txt', 'utf8').slice(-8000); }
            catch (_) {}
            try {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ci-output-rules',
                head_sha: context.sha,
                status: 'completed',
                conclusion: 'neutral',
                output: {
                  title: 'Firestore rules test output',
                  summary: ('### firestore rules\n```\n' + body + '\n```')
                    .slice(0, 65000),
                },
              });
            } catch (e) {
              core.warning('Failed to publish ci-output-rules check: ' + e.message);
            }

  # NOTE: the Cloud Functions CI job (Node 20: npm ci + lint + test) is added in
  # M8 when functions/ has a real package.json.
